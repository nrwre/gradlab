AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GradLab backend - serverless ML engine API.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12

Parameters:
  AiProvider:
    Type: String
    Default: stub
    AllowedValues: [stub, anthropic, openai]
  AnthropicApiKey:
    Type: String
    Default: ""
    NoEcho: true
  OpenAiApiKey:
    Type: String
    Default: ""
    NoEcho: true

Resources:
  GradLabFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: gradlab-api
      Handler: handler.handler
      CodeUri: ./
      Environment:
        Variables:
          AI_PROVIDER: !Ref AiProvider
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          OPENAI_API_KEY: !Ref OpenAiApiKey
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins: ["*"]
          AllowMethods: ["POST", "OPTIONS"]
          AllowHeaders: ["content-type"]

Outputs:
  ApiUrl:
    Description: Public Function URL - paste into frontend/config.js
    Value: !GetAtt GradLabFunctionUrl.FunctionUrl
